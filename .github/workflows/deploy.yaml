name: "deploy vdr-frontend on EKS"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - qa
          - prod
        default: "dev"

      project:
        description: "Name of the project to deploy"
        required: true
        default: "vdr"

      service:
        description: "Name of the service to deploy"
        required: true
        default: "vdr-frontend"

permissions:
  id-token: write     # REQUIRED for OIDC
  contents: read      # Needed to checkout code

jobs:
  deployEks:
    runs-on: [vdr-frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set AWS Account ID based on environment
        id: account_map
        run: |
          echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          if [[ "${{ github.event.inputs.environment }}" == "shared" ]]; then
            echo "AWS_ACCOUNT_ID=364819544347" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment }}" == "dev" ]]; then
            echo "AWS_ACCOUNT_ID=442168705691" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment }}" == "uat" ]]; then
            echo "AWS_ACCOUNT_ID=442168705691" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment }}" == "qa" ]]; then
            echo "AWS_ACCOUNT_ID=123456789012" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
            echo "AWS_ACCOUNT_ID=987654321098" >> $GITHUB_ENV
          else
            echo "Invalid environment"
            exit 1
          fi

      - name: Assume AWS Role Based on Environment
        run: |
          ROLE_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/common-erm-assumable-role"

          CREDS=$(aws sts assume-role \
            --role-arn "$ROLE_ARN" \
            --role-session-name github-actions-session)

          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r '.Credentials.SecretAccessKey')" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | jq -r '.Credentials.SessionToken')" >> $GITHUB_ENV

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0
          install: true

      - name: Build and Push with Buildx ECR Cache
        env:
          ECR_REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: ${{ inputs.environment }}-${{ inputs.service }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          echo "Building ${{ inputs.environment }} image with Docker Buildx and ECR cache..."
          
          # Build with proper cache import/export using buildx
          docker buildx build \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache \
            --cache-to type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache,mode=max,image-manifest=true,oci-mediatypes=true \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            --provenance false \
            .
          
          echo "Build complete with cache!"
          echo "Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Environment: ${{ inputs.environment }}"
          echo "Cache: $ECR_REGISTRY/$ECR_REPOSITORY:buildcache"

      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV
        

      - name: Performing the helm deploy
        env:
          ECR_REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: ${{ inputs.environment }}-${{ inputs.service }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          HOST_URL: ${{ inputs.environment == 'prod' && 'vdr.ermtools.app' || inputs.environment == 'uat' && 'erm-vdr-uat.app' || 'erm-vdr-dev.ermtools.app' }}
        run: |
          aws eks update-kubeconfig --name dev-erm-eks-manual --region us-east-1
          certArn=$(aws acm list-certificates --query "CertificateSummaryList[?DomainName=='*.ermtools.app'].CertificateArn" --output text)
          helm upgrade --install -n ${{ inputs.environment }} --create-namespace \
          --set image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
          --set image.tag=$IMAGE_TAG \
          --set environment=${{ inputs.environment }} \
          --set ingress.hosts[0].host=$HOST_URL \
          --set ingress.annotations.'alb\.ingress\.kubernetes\.io/certificate-arn'=$certArn \
          --set ingress.annotations.'alb\.ingress\.kubernetes\.io/load-balancer-name'=${{ inputs.environment }}-erm-alb \
          -f helm/${{ inputs.service }}/values.yaml ${{ inputs.service }} helm/${{ inputs.service }}/